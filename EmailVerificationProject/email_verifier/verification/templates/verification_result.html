<!DOCTYPE html>
<html>
<head>
    <title>Verification Status</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #28a745; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Status</h1>
        <p>{{ message }}</p>
        <button onclick="window.close()">Close Tab</button>
    </div>
</body>
</html>
