<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Status | RailGuard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f4f8; margin: 0; }
        .card { background: white; padding: 50px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h1 { color: #2d3748; margin-bottom: 15px; font-size: 24px; }
        p { color: #718096; line-height: 1.6; margin-bottom: 30px; }
        .btn-close { background: #4a5568; color: white; padding: 12px 25px; border-radius: 8px; text-decoration: none; border: none; cursor: pointer; font-weight: 600; }
        .btn-close:hover { background: #2d3748; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🛡️</div>
        <h1>Security Status</h1>
        <p>{{ message }}</p>
        <button class="btn-close" onclick="window.close()">Close Secure Tab</button>
    </div>
</body>
</html>
