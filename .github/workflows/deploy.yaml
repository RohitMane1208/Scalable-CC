name: API CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # 1) SONARCLOUD ANALYSIS
  sonarcloud:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          # Point Sonar to the specific source folder
          args: >
            -Dsonar.projectKey=RohitMane1208_Scalable-CC
            -Dsonar.organization=rohitmane1208
            -Dsonar.sources=email_verifier
            -Dsonar.python.version=3.9
            -Dsonar.exclusions=**/migrations/**,**/static/**,venv/**,**/db.sqlite3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          
  # 2) DEPLOYING TO AWS ELASTIC BEANSTALK
  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deployment package
        run: |
          # Change directory into your Django project root
          cd email_verifier
          # Zip everything inside THIS folder into the parent directory
          zip -r ../application.zip . -x "venv/*" "*.sqlite3" "__pycache__/*"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          application_name: email_verifier
          environment_name: email-verifier-env
          version_label: Validation-${{ github.run_number }}
          region: us-east-1
          # Point to the zip created in the parent directory
          deployment_package: application.zip

  # 3) OWASP ZAP SECURITY SCAN
  owasp-zap:
    name: OWASP ZAP Security Scan
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          # Target your EB environment URL, not the API Gateway
          target: 'http://email-verifier-env.eba-jxvqtmpn.us-east-1.elasticbeanstalk.com/'
          allow_issue_writing: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report.html